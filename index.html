<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>视频去水印</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root {
  --bg:#0d0f14; --surface:#161920; --surface2:#1e2230;
  --border:#2a2f3d; --accent:#4fffb0; --accent2:#4fb8ff;
  --warn:#ffb84f; --danger:#ff5f6d;
  --text:#e8ecf4; --text2:#7c8498; --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;padding:16px;padding-bottom:48px;}

.header{text-align:center;padding:26px 0 20px;}
.header h1{font-size:1.5rem;font-weight:700;letter-spacing:.04em;}
.header h1 span{color:var(–accent);}
.header p{margin-top:5px;font-size:.72rem;color:var(–text2);font-family:‘DM Mono’,monospace;}

.steps{display:flex;justify-content:center;align-items:center;margin-bottom:20px;}
.step{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(–text2);font-family:‘DM Mono’,monospace;}
.step.active{color:var(–accent);}
.step.done{color:var(–accent2);}
.step-num{width:20px;height:20px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0;}
.step.done .step-num{background:var(–accent2);border-color:var(–accent2);color:#000;}
.step.active .step-num{background:var(–accent);border-color:var(–accent);color:#000;}
.step-line{width:22px;height:1.5px;background:var(–border);}

.card{background:var(–surface);border:1px solid var(–border);border-radius:var(–r);padding:16px;margin-bottom:14px;}
.card-title{font-size:.7rem;font-family:‘DM Mono’,monospace;color:var(–text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:’’;width:6px;height:6px;border-radius:50%;background:var(–accent);flex-shrink:0;}

/* upload */
.upload-zone{border:1.5px dashed var(–border);border-radius:10px;padding:32px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.upload-zone:active{border-color:var(–accent);background:rgba(79,255,176,.04);}
.upload-icon{font-size:2.2rem;margin-bottom:10px;display:block;}
.upload-main{font-size:.92rem;font-weight:500;margin-bottom:4px;}
.upload-sub{font-size:.72rem;color:var(–text2);font-family:‘DM Mono’,monospace;}
#fileInput{display:none;}

/* video */
#videoSection{display:none;}
.video-wrapper{position:relative;background:#000;border-radius:10px;overflow:hidden;width:100%;margin-bottom:12px;}
#srcVideo{width:100%;display:block;max-height:260px;object-fit:contain;}
#overlayCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;}
#overlayCanvas.drawing{pointer-events:auto;cursor:crosshair;}

/* region */
#regionSection{display:none;}
.region-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.field label{display:block;font-size:.62rem;font-family:‘DM Mono’,monospace;color:var(–text2);margin-bottom:3px;text-transform:uppercase;}
.field input[type=number]{width:100%;background:var(–surface2);border:1px solid var(–border);border-radius:8px;color:var(–text);font-family:‘DM Mono’,monospace;font-size:.85rem;padding:8px 10px;outline:none;transition:border-color .2s;}
.field input[type=number]:focus{border-color:var(–accent2);}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:40px;border:none;font-size:.82rem;font-weight:500;font-family:‘Noto Sans SC’,sans-serif;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;}
.btn:active{transform:scale(.96);}
.btn:disabled{opacity:.35;pointer-events:none;}
.btn-accent{background:var(–accent);color:#050a05;}
.btn-blue{background:var(–accent2);color:#030c14;}
.btn-warn{background:var(–warn);color:#12090a;}
.btn-ghost{background:var(–surface2);color:var(–text);border:1px solid var(–border);}
.btn-full{width:100%;}
.tool-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}

/* progress */
#progressSection{display:none;}
.prog-head{display:flex;justify-content:space-between;font-size:.7rem;font-family:‘DM Mono’,monospace;color:var(–text2);margin-bottom:6px;}
#progPct{color:var(–accent);}
.prog-track{width:100%;height:4px;background:var(–surface2);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(–accent),var(–accent2));border-radius:2px;transition:width .4s;}
.log-box{background:var(–surface2);border-radius:8px;padding:10px 12px;font-family:‘DM Mono’,monospace;font-size:.68rem;color:var(–text2);line-height:1.9;min-height:52px;}

/* result */
#resultSection{display:none;}
#outVideo{width:100%;display:block;max-height:260px;object-fit:contain;border-radius:10px;background:#000;margin-bottom:12px;}

/* toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(–surface2);border:1px solid var(–border);color:var(–text);padding:10px 20px;border-radius:40px;font-size:.75rem;font-family:‘DM Mono’,monospace;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;z-index:999;white-space:nowrap;max-width:calc(100vw - 32px);text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:var(–accent);color:var(–accent);}
#toast.err{border-color:var(–danger);color:var(–danger);}
#toast.warn{border-color:var(–warn);color:var(–warn);}

.badge{display:inline-block;font-family:‘DM Mono’,monospace;font-size:.6rem;padding:2px 7px;border-radius:20px;margin-left:6px;background:rgba(79,255,176,.1);color:var(–accent);border:1px solid rgba(79,255,176,.25);}
.hint{font-size:.7rem;color:var(–text2);line-height:1.65;padding:8px 10px;background:var(–surface2);border-radius:8px;margin-top:8px;font-family:‘DM Mono’,monospace;}
</style>

</head>
<body>

<div class="header">
  <h1>视频<span>去水印</span></h1>
  <p>Safari · VideoEncoder · MP4输出</p>
</div>

<div class="steps">
  <div class="step active" id="s1"><div class="step-num">1</div>上传</div>
  <div class="step-line"></div>
  <div class="step" id="s2"><div class="step-num">2</div>选区</div>
  <div class="step-line"></div>
  <div class="step" id="s3"><div class="step-num">3</div>处理</div>
  <div class="step-line"></div>
  <div class="step" id="s4"><div class="step-num">4</div>下载</div>
</div>

<!-- 1. UPLOAD -->

<div class="card" id="uploadCard">
  <div class="card-title">上传视频</div>
  <div class="upload-zone" id="uploadZone">
    <span class="upload-icon">🎬</span>
    <div class="upload-main">点击选择视频文件</div>
    <div class="upload-sub">MP4 · MOV · ≤500MB</div>
    <input type="file" id="fileInput" accept="video/*">
  </div>
</div>

<!-- 2. VIDEO + SELECT -->

<div class="card" id="videoSection">
  <div class="card-title">框选水印区域</div>
  <div class="video-wrapper">
    <video id="srcVideo" playsinline webkit-playsinline controls muted></video>
    <canvas id="overlayCanvas"></canvas>
  </div>
  <div class="tool-row">
    <button class="btn btn-blue" id="btnDraw">✏️ 手动框选</button>
    <button class="btn btn-warn" id="btnAuto">🔍 自动识别</button>
    <button class="btn btn-ghost" id="btnClear">✕ 清除</button>
  </div>
  <div class="hint">先▶播放找到水印帧后暂停，再点「手动框选」在视频上拖拽，或点「自动识别」自动查找。</div>
</div>

<!-- 3. REGION -->

<div class="card" id="regionSection">
  <div class="card-title">区域微调 <span class="badge" id="regionBadge">未设置</span></div>
  <div class="region-grid">
    <div class="field"><label>X 左边距</label><input type="number" id="rx" value="0" min="0"></div>
    <div class="field"><label>Y 上边距</label><input type="number" id="ry" value="0" min="0"></div>
    <div class="field"><label>宽度 W</label><input type="number" id="rw" value="100" min="1"></div>
    <div class="field"><label>高度 H</label><input type="number" id="rh" value="30" min="1"></div>
  </div>
  <button class="btn btn-ghost btn-full" id="btnPreview" style="margin-bottom:8px;">👁 预览当前帧效果</button>
  <button class="btn btn-accent btn-full" id="btnProcess">⚡ 开始去水印（全视频）</button>
</div>

<!-- 4. PROGRESS -->

<div class="card" id="progressSection">
  <div class="card-title">处理中</div>
  <div class="prog-head"><span id="progMsg">准备中...</span><span id="progPct">0%</span></div>
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  <div class="log-box" id="logBox">-</div>
</div>

<!-- 5. RESULT -->

<div class="card" id="resultSection">
  <div class="card-title">处理完成 ✓</div>
  <video id="outVideo" controls playsinline webkit-playsinline></video>
  <div class="tool-row" style="margin-top:0">
    <button class="btn btn-accent" id="btnDownload" style="flex:2">⬇ 下载 MP4</button>
    <button class="btn btn-ghost" id="btnReset" style="flex:1">重来</button>
  </div>
</div>

<div id="toast"></div>

<!-- mp4-muxer from CDN -->

<script type="module">
import { Muxer, ArrayBufferTarget } from 'https://cdn.jsdelivr.net/npm/mp4-muxer@5/build/mp4-muxer.mjs';
window._Muxer = Muxer;
window._ArrayBufferTarget = ArrayBufferTarget;
window._muxerReady = true;
window.dispatchEvent(new Event('muxerReady'));
</script>

<script>
(function(){

/* ── DOM ── */
const $=id=>document.getElementById(id);
const uploadCard=$('uploadCard'), uploadZone=$('uploadZone'), fileInput=$('fileInput');
const videoSection=$('videoSection'), regionSection=$('regionSection');
const progressSection=$('progressSection'), resultSection=$('resultSection');
const srcVideo=$('srcVideo'), overlayCanvas=$('overlayCanvas');
const oCtx=overlayCanvas.getContext('2d');
const btnDraw=$('btnDraw'), btnAuto=$('btnAuto'), btnClear=$('btnClear');
const btnPreview=$('btnPreview'), btnProcess=$('btnProcess');
const btnDownload=$('btnDownload'), btnReset=$('btnReset');
const rx=$('rx'),ry=$('ry'),rw=$('rw'),rh=$('rh');
const regionBadge=$('regionBadge');
const progFill=$('progFill'), progMsg=$('progMsg'), progPct=$('progPct'), logBox=$('logBox');
const outVideo=$('outVideo');
const steps=[1,2,3,4].map(i=>$('s'+i));

/* ── STATE ── */
let file=null, fileURL=null, vW=0, vH=0;
let region=null;
let drawMode=false, isDrawing=false, drawStart=null;
let resultURL=null;
let muxerReady=false;

window.addEventListener('muxerReady',()=>{ muxerReady=true; });
if(window._muxerReady) muxerReady=true;

/* ── TOAST ── */
function toast(msg,type=''){
  const el=$('toast');
  el.textContent=msg; el.className='show'+(type?' '+type:'');
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='',3000);
}

/* ── STEPS ── */
function setStep(n){ steps.forEach((s,i)=>s.className='step'+(i+1<n?' done':i+1===n?' active':'')); }

/* ── PROGRESS ── */
function setProg(pct,msg,log){
  progFill.style.width=pct+'%';
  progPct.textContent=Math.round(pct)+'%';
  if(msg) progMsg.textContent=msg;
  if(log) logBox.textContent=log;
}

/* ── REGION ── */
function readR(){ return{x:parseInt(rx.value)||0,y:parseInt(ry.value)||0,w:Math.max(1,parseInt(rw.value)||1),h:Math.max(1,parseInt(rh.value)||1)}; }
function syncR(r){
  rx.value=Math.floor(r.x); ry.value=Math.floor(r.y);
  rw.value=Math.floor(r.w); rh.value=Math.floor(r.h);
  region={x:Math.floor(r.x),y:Math.floor(r.y),w:Math.floor(r.w),h:Math.floor(r.h)};
  regionBadge.textContent=`(${region.x},${region.y}) ${region.w}×${region.h}`;
}

/* ── FILL: 周边背景采样插值 ──
   取框四周各3排像素，按距离加权平均，
   区域内每个像素按其到四边的距离双线性混合，
   结果自然贴合周围背景。 */
function applyFill(ctx, r, W, H){
  const {x, y, w, h} = r;
  const id = ctx.getImageData(0, 0, W, H);
  const d = id.data;

  // 采样宽度：框尺寸的1倍，最少10像素，最多40像素
  const BAND = Math.max(10, Math.min(40, Math.round(Math.min(w, h))));

  // 对每一列/行，在框外 BAND 像素范围内均匀采样，返回平均色数组
  function sampleEdge(getX, getY, len){
    const result = [];
    for(let i = 0; i < len; i++){
      let sr=0, sg=0, sb=0, cnt=0;
      for(let k = 1; k <= BAND; k++){
        const sx = Math.max(0, Math.min(W-1, getX(i, k)));
        const sy = Math.max(0, Math.min(H-1, getY(i, k)));
        const idx = (sy * W + sx) * 4;
        sr += d[idx]; sg += d[idx+1]; sb += d[idx+2]; cnt++;
      }
      result.push([sr/cnt, sg/cnt, sb/cnt]);
    }
    return result;
  }

  const topEdge = sampleEdge((i,k) => x+i,       (i,k) => y-k,         w);
  const botEdge = sampleEdge((i,k) => x+i,       (i,k) => y+h-1+k,     w);
  const lftEdge = sampleEdge((i,k) => x-k,       (i,k) => y+i,         h);
  const rgtEdge = sampleEdge((i,k) => x+w-1+k,   (i,k) => y+i,         h);

  for(let row = y; row < y + h; row++){
    for(let col = x; col < x + w; col++){
      const tx = w > 1 ? (col - x) / (w - 1) : 0.5;
      const ty = h > 1 ? (row - y) / (h - 1) : 0.5;

      const [tR,tG,tB] = topEdge[col - x];
      const [bR,bG,bB] = botEdge[col - x];
      const [lR,lG,lB] = lftEdge[row - y];
      const [rR,rG,rB] = rgtEdge[row - y];

      // 双线性插值，无噪点
      const iR = (tR*(1-ty) + bR*ty) * 0.5 + (lR*(1-tx) + rR*tx) * 0.5;
      const iG = (tG*(1-ty) + bG*ty) * 0.5 + (lG*(1-tx) + rG*tx) * 0.5;
      const iB = (tB*(1-ty) + bB*ty) * 0.5 + (lB*(1-tx) + rB*tx) * 0.5;

      const idx = (row * W + col) * 4;
      d[idx]   = Math.min(255, Math.max(0, iR));
      d[idx+1] = Math.min(255, Math.max(0, iG));
      d[idx+2] = Math.min(255, Math.max(0, iB));
    }
  }
  ctx.putImageData(id, 0, 0);
}

/* ── OVERLAY ── */
function syncOverlay(){
  const rect=srcVideo.getBoundingClientRect();
  if(!rect.width)return;
  overlayCanvas.width=rect.width; overlayCanvas.height=rect.height;
  overlayCanvas.style.width=rect.width+'px'; overlayCanvas.style.height=rect.height+'px';
}
function v2d(vx,vy){const r=srcVideo.getBoundingClientRect();return{x:vx*r.width/vW,y:vy*r.height/vH};}
function d2v(dx,dy){const r=srcVideo.getBoundingClientRect();return{x:dx*vW/r.width,y:dy*vH/r.height};}
function drawOverlay(){
  oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  if(!region)return;
  const tl=v2d(region.x,region.y),br=v2d(region.x+region.w,region.y+region.h);
  const dw=br.x-tl.x,dh=br.y-tl.y;
  oCtx.fillStyle='rgba(0,0,0,.4)';
  oCtx.fillRect(0,0,overlayCanvas.width,overlayCanvas.height);
  oCtx.clearRect(tl.x,tl.y,dw,dh);
  oCtx.strokeStyle='#4fffb0'; oCtx.lineWidth=2;
  oCtx.strokeRect(tl.x,tl.y,dw,dh);
  const cs=8; oCtx.fillStyle='#4fffb0';
  [[tl.x,tl.y],[tl.x+dw-cs,tl.y],[tl.x,tl.y+dh-cs],[tl.x+dw-cs,tl.y+dh-cs]].forEach(([hx,hy])=>oCtx.fillRect(hx,hy,cs,cs));
  oCtx.font='11px DM Mono,monospace'; oCtx.fillStyle='#4fffb0';
  oCtx.fillText(`${region.w}×${region.h}`,tl.x+2,tl.y-5);
}
srcVideo.addEventListener('pause',()=>{syncOverlay();drawOverlay();});
srcVideo.addEventListener('play',()=>oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height));
window.addEventListener('resize',()=>{if(vW){syncOverlay();drawOverlay();}});

/* ── DRAW MODE ── */
function getPos(e){const r=overlayCanvas.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function enableDraw(){if(!vW){toast('请先上传视频','warn');return;}srcVideo.pause();drawMode=true;overlayCanvas.classList.add('drawing');syncOverlay();toast('拖拽框选水印区域','ok');}
function disableDraw(){drawMode=false;overlayCanvas.classList.remove('drawing');}
function onDown(e){if(!drawMode)return;e.preventDefault();isDrawing=true;drawStart=getPos(e);}
function onMove(e){
  if(!isDrawing||!drawMode)return;e.preventDefault();
  const c=getPos(e),x=Math.min(drawStart.x,c.x),y=Math.min(drawStart.y,c.y),w=Math.abs(c.x-drawStart.x),h=Math.abs(c.y-drawStart.y);
  oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  oCtx.strokeStyle='#4fffb0';oCtx.lineWidth=2;oCtx.setLineDash([6,3]);
  oCtx.strokeRect(x,y,w,h);oCtx.setLineDash([]);
  oCtx.fillStyle='rgba(79,255,176,.07)';oCtx.fillRect(x,y,w,h);
}
function onUp(e){
  if(!isDrawing||!drawMode)return;isDrawing=false;
  const br=overlayCanvas.getBoundingClientRect(),t=e.changedTouches?e.changedTouches[0]:e;
  const c={x:t.clientX-br.left,y:t.clientY-br.top};
  const dx=Math.min(drawStart.x,c.x),dy=Math.min(drawStart.y,c.y),dw=Math.abs(c.x-drawStart.x),dh=Math.abs(c.y-drawStart.y);
  if(dw<5||dh<5){toast('区域太小，请重试','warn');oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);return;}
  const v1=d2v(dx,dy),v2=d2v(dx+dw,dy+dh);
  syncR({x:Math.max(0,v1.x),y:Math.max(0,v1.y),w:Math.min(vW-v1.x,v2.x-v1.x),h:Math.min(vH-v1.y,v2.y-v1.y)});
  disableDraw();drawOverlay();
  regionSection.style.display='block';setStep(2);
  toast('区域已设置，可微调后处理','ok');
}
overlayCanvas.addEventListener('mousedown',onDown);
overlayCanvas.addEventListener('mousemove',onMove);
overlayCanvas.addEventListener('mouseup',onUp);
overlayCanvas.addEventListener('touchstart',onDown,{passive:false});
overlayCanvas.addEventListener('touchmove',onMove,{passive:false});
overlayCanvas.addEventListener('touchend',onUp);

/* ── AUTO DETECT ── */
function autoDetect(){
  if(!vW){toast('请先上传视频','warn');return;}
  srcVideo.pause();
  const c=document.createElement('canvas');c.width=vW;c.height=vH;
  const ctx=c.getContext('2d');ctx.drawImage(srcVideo,0,0,vW,vH);
  const id=ctx.getImageData(0,0,vW,vH),d=id.data;
  const hot=new Uint8Array(vW*vH);
  for(let i=0;i<vW*vH;i++){const r=d[i*4],g=d[i*4+1],b=d[i*4+2],br2=(r+g+b)/3,sat=Math.max(Math.abs(r-g),Math.abs(g-b),Math.abs(b-r));if(br2>210&&sat<35)hot[i]=1;}
  const dil=new Uint8Array(vW*vH),K=5;
  for(let y=0;y<vH;y++)for(let x=0;x<vW;x++){if(!hot[y*vW+x])continue;for(let ky=-K;ky<=K;ky++)for(let kx=-K;kx<=K;kx++){const nx=x+kx,ny=y+ky;if(nx>=0&&nx<vW&&ny>=0&&ny<vH)dil[ny*vW+nx]=1;}}
  const vis=new Uint8Array(vW*vH),cands=[];
  for(let y=0;y<vH;y++)for(let x=0;x<vW;x++){
    if(!dil[y*vW+x]||vis[y*vW+x])continue;
    const q=[{x,y}];vis[y*vW+x]=1;let minX=x,maxX=x,minY=y,maxY=y,cnt=0,qi=0;
    while(qi<q.length){const{x:cx,y:cy}=q[qi++];cnt++;if(cx<minX)minX=cx;if(cx>maxX)maxX=cx;if(cy<minY)minY=cy;if(cy>maxY)maxY=cy;for(const[nx,ny]of[[cx-1,cy],[cx+1,cy],[cx,cy-1],[cx,cy+1]]){if(nx>=0&&nx<vW&&ny>=0&&ny<vH&&!vis[ny*vW+nx]&&dil[ny*vW+nx]){vis[ny*vW+nx]=1;q.push({x:nx,y:ny});}}}
    const bw=maxX-minX+1,bh=maxY-minY+1,area=bw*bh;
    if(cnt>=12&&area<vW*vH*.3)cands.push({x:minX,y:minY,w:bw,h:bh,cnt,area});
  }
  if(!cands.length){toast('未找到明显水印，请手动框选','err');return;}
  const sc=cands.map(c=>{
    const cx=c.x+c.w/2,cy=c.y+c.h/2;
    const cd=Math.min(Math.hypot(cx,cy),Math.hypot(vW-cx,cy),Math.hypot(cx,vH-cy),Math.hypot(vW-cx,vH-cy));
    const asp=c.w/c.h;
    return{...c,score:c.cnt/c.area*.25+(1-cd/Math.hypot(vW,vH)*2)*.45+(asp>=1.5&&asp<=25?.15:0)+(c.area<vW*vH*.06?.15:0)};
  });
  sc.sort((a,b)=>b.score-a.score);
  const best=sc[0],pad=5;
  syncR({x:Math.max(0,best.x-pad),y:Math.max(0,best.y-pad),w:Math.min(vW-(best.x-pad),best.w+pad*2),h:Math.min(vH-(best.y-pad),best.h+pad*2)});
  syncOverlay();drawOverlay();regionSection.style.display='block';setStep(2);
  toast(`已识别 ${region.w}×${region.h}，可微调`,'ok');
}

/* ── PREVIEW FRAME ── */
function previewFrame(){
  if(!vW){toast('请先上传视频','warn');return;}
  srcVideo.pause();
  const r=readR(),c=document.createElement('canvas');c.width=vW;c.height=vH;
  const ctx=c.getContext('2d');ctx.drawImage(srcVideo,0,0,vW,vH);
  applyFill(ctx,r,vW,vH);
  syncOverlay();
  oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  oCtx.drawImage(c,0,0,overlayCanvas.width,overlayCanvas.height);
  toast('预览4秒后消失','ok');
  setTimeout(()=>{oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);drawOverlay();},4000);
}

/* ── PROCESS VIDEO (VideoEncoder + mp4-muxer) ── */
async function processVideo(){
  const r=readR();
  if(!file){toast('请先上传视频','err');return;}
  if(!r.w||!r.h){toast('请先设置水印区域','warn');return;}

  // wait for muxer module
  if(!muxerReady){
    toast('正在加载处理模块，请稍候...','warn');
    await new Promise(res=>window.addEventListener('muxerReady',res,{once:true}));
  }
  if(!window._Muxer){toast('处理模块加载失败，请检查网络','err');return;}
  if(typeof VideoEncoder==='undefined'){toast('当前浏览器不支持VideoEncoder，请升级Safari','err');return;}

  setStep(3);
  regionSection.style.display='none';
  videoSection.style.display='none';
  progressSection.style.display='block';
  setProg(0,'准备中...','加载视频...');

  try {
    const blob = await encode(file, r);
    if(resultURL) URL.revokeObjectURL(resultURL);
    resultURL = URL.createObjectURL(blob);
    outVideo.src = resultURL;
    progressSection.style.display='none';
    resultSection.style.display='block';
    setStep(4);
    toast('处理完成！','ok');
  } catch(e){
    progressSection.style.display='none';
    videoSection.style.display='block';
    regionSection.style.display='block';
    setStep(2);
    toast('处理失败: '+e.message,'err');
    console.error(e);
  }
}

async function encode(f, r){
  // Step 1: load video metadata via hidden video element
  const vid=document.createElement('video');
  vid.muted=true; vid.preload='auto';
  const srcURL=URL.createObjectURL(f);
  vid.src=srcURL;

  await new Promise((res,rej)=>{
    vid.onloadedmetadata=res;
    vid.onerror=()=>rej(new Error('视频加载失败 code='+vid.error?.code));
    vid.load();
  });

  const W=vid.videoWidth, H=vid.videoHeight, dur=vid.duration;
  if(!W||!H||!isFinite(dur)) throw new Error('视频尺寸或时长无效');

  // Scale region to actual resolution
  const sx=W/vW, sy=H/vH;
  const sr={x:Math.round(r.x*sx),y:Math.round(r.y*sy),w:Math.max(1,Math.round(r.w*sx)),h:Math.max(1,Math.round(r.h*sy))};

  setProg(2,'初始化编码器...',`分辨率 ${W}×${H}，时长 ${dur.toFixed(1)}s`);

  // Step 2: set up mp4-muxer
  const target=new window._ArrayBufferTarget();
  const muxer=new window._Muxer({
    target,
    video:{codec:'avc',width:W,height:H},
    fastStart:'in-memory',
  });

  // Step 3: set up VideoEncoder
  // Try hardware-accelerated first, fall back to software
  let encoderConfig={
    codec:'avc1.4d0028',  // H.264 High Profile Level 4
    width:W, height:H,
    bitrate:5_000_000,
    framerate:30,
    hardwareAcceleration:'prefer-hardware',
  };
  // Check support
  let support;
  try { support=await VideoEncoder.isConfigSupported(encoderConfig); } catch(e){ support={supported:false}; }
  if(!support.supported){
    encoderConfig={...encoderConfig, codec:'avc1.42001e', hardwareAcceleration:'prefer-software'};
    try { support=await VideoEncoder.isConfigSupported(encoderConfig); } catch(e){ support={supported:false}; }
  }
  if(!support.supported) throw new Error('VideoEncoder 不支持 H.264，请升级系统');

  const encoder=new VideoEncoder({
    output:(chunk,meta)=>muxer.addVideoChunk(chunk,meta),
    error:e=>{ throw e; },
  });
  encoder.configure(encoderConfig);

  // Step 4: seek frame by frame
  const FPS=30;
  const frameInterval=1/FPS;
  const totalFrames=Math.ceil(dur*FPS);
  const offscreen=new OffscreenCanvas(W,H);
  const offCtx=offscreen.getContext('2d');

  setProg(3,'逐帧处理中...',`共约 ${totalFrames} 帧`);

  let frameIdx=0;
  const seekAndCapture=()=>new Promise(res=>{
    const onSeeked=()=>{ vid.removeEventListener('seeked',onSeeked); res(); };
    vid.addEventListener('seeked',onSeeked);
  });

  for(let t=0; t<=dur+frameInterval*0.5; t+=frameInterval){
    const clampedT=Math.min(t,dur-0.001);
    vid.currentTime=clampedT;
    await seekAndCapture();

    offCtx.drawImage(vid,0,0,W,H);
    applyFill(offCtx,sr,W,H);

    const timestamp=Math.round(frameIdx*(1_000_000/FPS));
    const duration=Math.round(1_000_000/FPS);

    const frame=new VideoFrame(offscreen,{timestamp,duration});
    const keyFrame=frameIdx%(FPS*2)===0;
    encoder.encode(frame,{keyFrame});
    frame.close();

    frameIdx++;
    const pct=Math.min(97,(frameIdx/totalFrames)*95+3);
    if(frameIdx%5===0){
      setProg(pct,'逐帧处理中...',`第 ${frameIdx} / ${totalFrames} 帧  (${clampedT.toFixed(1)}s)`);
      // yield to keep UI responsive
      await new Promise(r=>setTimeout(r,0));
    }

    // Flush encoder periodically to free memory
    if(frameIdx%150===0){
      await encoder.flush();
    }
  }

  setProg(97,'编码完成，封装MP4...','请稍候...');
  await encoder.flush();
  encoder.close();
  muxer.finalize();

  URL.revokeObjectURL(srcURL);
  setProg(100,'完成！',`输出 ${W}×${H} MP4`);
  return new Blob([target.buffer],{type:'video/mp4'});
}

/* ── UPLOAD ── */
uploadZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});

function loadFile(f){
  if(f.size>500*1024*1024){toast('文件超过500MB','err');return;}
  file=f;
  if(fileURL)URL.revokeObjectURL(fileURL);
  fileURL=URL.createObjectURL(f);
  srcVideo.src=fileURL;
  srcVideo.onloadedmetadata=()=>{
    vW=srcVideo.videoWidth; vH=srcVideo.videoHeight;
    if(!vW||!vH){toast('视频分辨率读取失败','err');return;}
    uploadCard.style.display='none';
    videoSection.style.display='block';
    syncOverlay(); setStep(1);
    toast('视频已加载，请暂停后框选水印','ok');
  };
  srcVideo.onerror=()=>{
    const code=srcVideo.error?.code;
    toast(`视频加载失败(code=${code})，请在Safari中打开本页`,'err');
  };
}

/* ── BUTTONS ── */
btnDraw.addEventListener('click',enableDraw);
btnAuto.addEventListener('click',autoDetect);
btnClear.addEventListener('click',()=>{region=null;disableDraw();oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);regionSection.style.display='none';regionBadge.textContent='未设置';});
btnPreview.addEventListener('click',previewFrame);
btnProcess.addEventListener('click',processVideo);
btnDownload.addEventListener('click',()=>{
  if(!resultURL){toast('无可下载内容','warn');return;}
  const a=document.createElement('a');a.href=resultURL;a.download='no_watermark_'+Date.now()+'.mp4';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('下载已开始','ok');
});
btnReset.addEventListener('click',()=>{
  file=null;region=null;vW=0;vH=0;
  if(fileURL){URL.revokeObjectURL(fileURL);fileURL=null;}
  if(resultURL){URL.revokeObjectURL(resultURL);resultURL=null;}
  srcVideo.src='';outVideo.src='';
  [uploadCard,videoSection,regionSection,progressSection,resultSection].forEach((el,i)=>el.style.display=i===0?'block':'none');
  oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  fileInput.value='';setStep(1);toast('已重置','');
  uploadCard.style.display='block';
});
[rx,ry,rw,rh].forEach(inp=>inp.addEventListener('input',()=>{
  region=readR();
  regionBadge.textContent=`(${region.x},${region.y}) ${region.w}×${region.h}`;
  syncOverlay();drawOverlay();
}));

})();
</script>
