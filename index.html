<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 演奏合成终端 (带下载功能)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system; }
        .canvas-box { position: relative; width: 100%; max-width: 400px; aspect-ratio: 9/16; background: #1a1a1a; border-radius: 20px; overflow: hidden; margin: 0 auto; }
        #renderCanvas { width: 100%; height: 100%; object-fit: contain; }
        .ios-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .download-btn { background: #34C759; display: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-md space-y-6">
        <div class="text-center pt-2">
            <h1 class="text-xl font-bold">本地 AI 指法渲染器</h1>
            <p class="text-[10px] text-zinc-500 uppercase mt-1">Real-time Spectral Mapping & Recording</p>
        </div>

        <div class="canvas-box shadow-2xl border border-white/10">
            <canvas id="renderCanvas"></canvas>
            <div id="recStatus" class="absolute top-4 left-4 flex items-center hidden">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse mr-2"></span>
                <span class="text-[10px] font-bold text-red-600">正在录制并合成...</span>
            </div>
        </div>

        <div class="ios-card p-6 rounded-3xl space-y-4">
            <div class="space-y-2">
                <label class="text-xs font-medium text-zinc-400">1. 人物/吉他手照片</label>
                <input type="file" id="imgInput" accept="image/*" class="w-full text-xs text-zinc-500 file:mr-3 file:py-2 file:px-4 file:rounded-full file:bg-zinc-800 file:text-white file:border-0">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-medium text-zinc-400">2. 演奏音频 (MP3)</label>
                <input type="file" id="audInput" accept=".mp3" class="w-full text-xs text-zinc-500 file:mr-3 file:py-2 file:px-4 file:rounded-full file:bg-zinc-800 file:text-white file:border-0">
            </div>

            <div class="flex flex-col gap-3 pt-4">
                <button id="startBtn" class="w-full bg-blue-600 py-4 rounded-2xl font-bold active:scale-95 transition-all">开始合成与录制</button>
                <a id="downloadLink" class="download-btn w-full py-4 rounded-2xl font-bold text-center active:scale-95 transition-all">下载合成视频</a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const imgInput = document.getElementById('imgInput');
        const audInput = document.getElementById('audInput');
        const startBtn = document.getElementById('startBtn');
        const downloadLink = document.getElementById('downloadLink');
        const recStatus = document.getElementById('recStatus');

        let audioCtx, analyser, dataArray, source;
        let mainImg = new Image();
        let recorder, chunks = [];

        // 初始化画布
        canvas.width = 720;
        canvas.height = 1280;

        imgInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => mainImg.src = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
            mainImg.onload = () => ctx.drawImage(mainImg, 0, 0, canvas.width, canvas.height);
        };

        async function startSynthesis() {
            if (!imgInput.files[0] || !audInput.files[0]) return alert("请先上传文件");

            // 1. 设置音频环境
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const arrayBuffer = await audInput.files[0].arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            // 2. 设置视频录制器 (MediaRecorder)
            const stream = canvas.captureStream(30); // 30 FPS
            recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                downloadLink.href = url;
                downloadLink.download = "AI_Performance.mp4";
                downloadLink.style.display = 'block';
                startBtn.innerText = "重新合成";
                recStatus.classList.add('hidden');
            };

            // 3. 开始执行
            source.start(0);
            recorder.start();
            recStatus.classList.remove('hidden');
            startBtn.disabled = true;
            startBtn.innerText = "合成中...";

            function renderLoop() {
                if (source.playbackState === 3 || !audioCtx) return; // 已停止
                analyser.getByteFrequencyData(dataArray);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(mainImg, 0, 0, canvas.width, canvas.height);

                // --- 物理逻辑：吉他指法坐标对齐 ---
                const freqSample = dataArray[10]; // 提取特定音高频率
                const volSample = dataArray.reduce((a,b)=>a+b)/dataArray.length; // 平均能量

                // 模拟指法（基于频率驱动骨架点位移）
                ctx.fillStyle = "#007AFF";
                ctx.shadowBlur = 20;
                ctx.shadowColor = "#007AFF";
                for(let i=0; i<4; i++) {
                    const fingerX = 250 + (freqSample * 0.8) + (i * 20);
                    const fingerY = 700 + Math.sin(Date.now()*0.01 + i) * 15;
                    ctx.beginPath();
                    ctx.arc(fingerX, fingerY, 10, 0, Math.PI*2);
                    ctx.fill();
                }

                // 模拟唇部（基于音量驱动）
                ctx.beginPath();
                ctx.ellipse(canvas.width/2, 580, 20, 10 + volSample/5, 0, 0, Math.PI*2);
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fill();

                if (audioCtx.state !== 'closed') requestAnimationFrame(renderLoop);
            }
            renderLoop();

            source.onended = () => {
                recorder.stop();
                audioCtx.close();
            };
        }

        startBtn.onclick = () => {
            startSynthesis().catch(err => {
                alert("合成不成功，请确保上传了标准的 MP3 文档。");
                console.error(err);
            });
        };
    </script>
</body>
</html>
