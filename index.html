<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI multi-Dimensional Guitarist Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system; touch-action: none; -webkit-tap-highlight-color: transparent; }
        .canvas-container { position: relative; width: 100%; max-width: 360px; aspect-ratio: 9/16; background: #050505; border-radius: 24px; overflow: hidden; margin: 0 auto; border: 2px solid #333; }
        #renderCanvas { width: 100%; height: 100%; }
        .control-panel { background: rgba(15, 15, 20, 0.96); backdrop-filter: blur(25px); border-top: 1px solid #333; }
        input[type=range] { width: 100%; accent-color: #3b82f6; height: 5px; cursor: pointer; }
        .axis-label { font-size: 9px; color: #666; width: 25px; }
        .section-title { font-size: 11px; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .status-rec { background: #ee4444; border-radius: 50%; width: 10px; height: 10px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="p-3 flex-none">
        <div class="canvas-container shadow-2xl">
            <canvas id="renderCanvas"></canvas>
            <div id="recStatus" class="absolute top-4 left-4 hidden flex items-center bg-black/50 px-3 py-1 rounded-full">
                <span class="status-rec animate-pulse mr-2"></span>
                <span class="text-[10px] font-bold text-red-500">正在本地录制 AUDIO + VIDEO 轨道...</span>
            </div>
        </div>
    </div>

    <main class="control-panel flex-grow p-4 space-y-4 rounded-t-[2rem] overflow-y-auto">
        
        <div class="flex gap-2 mb-2">
            <button onclick="document.getElementById('imgIn').click()" class="flex-1 bg-zinc-800 py-3 rounded-xl text-xs font-bold active:scale-95">载入人物图</button>
            <button onclick="document.getElementById('audIn').click()" class="flex-1 bg-zinc-800 py-3 rounded-xl text-xs font-bold active:scale-95">载入MP3</button>
            <input type="file" id="imgIn" accept="image/*" class="hidden">
            <input type="file" id="audIn" accept="audio/mpeg" class="hidden">
        </div>

        <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
            <div class="section-title text-blue-400"><span>LIP SYNC (嘴部锚点锁定)</span><span id="v_lip">50, 45</span></div>
            <div class="flex gap-4">
                <div class="flex-1 flex items-center gap-2"><span class="axis-label">X</span><input type="range" id="mX" value="50"></div>
                <div class="flex-1 flex items-center gap-2"><span class="axis-label">Y</span><input type="range" id="mY" value="45"></div>
            </div>
        </div>

        <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
            <div class="section-title text-green-400"><span>LEFT HAND (左手/按弦锚点锁定)</span><span id="v_lh">30, 75</span></div>
            <div class="flex gap-4">
                <div class="flex-1 flex items-center gap-2"><span class="axis-label">X</span><input type="range" id="lX" value="30"></div>
                <div class="flex-1 flex items-center gap-2"><span class="axis-label">Y</span><input type="range" id="lY" value="75"></div>
            </div>
        </div>

        <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
            <div class="section-title text-purple-400"><span>RIGHT HAND (右手/拨弦锚点锁定)</span><span id="v_rh">70, 75</span></div>
            <div class="flex gap-4">
                <div class="flex-1 flex items-center gap-2"><span class="axis-label">X</span><input type="range" id="rX" value="70"></div>
                <div class="flex-1 flex items-center gap-2"><span class="axis-label">Y</span><input type="range" id="rY" value="75"></div>
            </div>
        </div>

        <div class="pt-2">
            <button id="startBtn" class="w-full bg-blue-600 h-14 rounded-2xl font-bold text-white shadow-lg shadow-blue-500/10 active:scale-95">开始同步渲染与导出</button>
            <a id="saveBtn" class="hidden w-full bg-green-600 h-14 rounded-2xl font-bold flex items-center justify-center mt-3 shadow-lg shadow-green-500/10 active:scale-95">下载已合成视频</a>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const ids = ['mX','mY','lX','lY','rX','rY'];
        const controls = {};
        ids.forEach(id => {
            controls[id] = document.getElementById(id);
            controls[id].oninput = () => renderPreview();
        });

        let audioCtx, analyser, dataArray, source, recorder, chunks = [];
        let mainImg = new Image();
        let isRecording = false; // 学术校验：区分预览与录制模式
        canvas.width = 720; canvas.height = 1280;

        document.getElementById('imgIn').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { mainImg.src = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
            mainImg.onload = () => renderPreview();
        };

        function renderPreview() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(mainImg.src) ctx.drawImage(mainImg,0,0,canvas.width,canvas.height);
            
            // 学术注意：校准框不再遮挡，仅在边缘绘制指示点
            const drawIndicator = (x, y, color) => {
                const px = canvas.width * (x/100);
                const py = canvas.height * (y/100);
                ctx.fillStyle = color; ctx.beginPath(); ctx.arc(px, py, 15, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 3; ctx.strokeRect(px-30, py-30, 60, 60);
            };
            drawIndicator(controls.mX.value, controls.mY.value, "#3b82f6");
            drawIndicator(controls.lX.value, controls.lY.value, "#10b981");
            drawIndicator(controls.rX.value, controls.rY.value, "#a855f7");
        }

        async function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const buffer = await (await document.getElementById('audIn').files[0].arrayBuffer());
            const audioBuffer = await audioCtx.decodeAudioData(buffer);
            const dest = audioCtx.createMediaStreamDestination();
            source = audioCtx.createBufferSource(); source.buffer = audioBuffer;
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
            analyser.smoothingTimeConstant = 0.8; // 动作平滑算子

            source.connect(analyser); analyser.connect(audioCtx.destination); source.connect(dest);

            const combinedStream = new MediaStream([
                ...canvas.captureStream(30).getVideoTracks(),
                ...dest.stream.getAudioTracks()
            ]);

            recorder = new MediaRecorder(combinedStream, { mimeType: 'video/mp4' });
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                document.getElementById('saveBtn').href = URL.createObjectURL(blob);
                document.getElementById('saveBtn').download = "ai_guitar_performance.mp4";
                document.getElementById('saveBtn').classList.remove('hidden');
                document.getElementById('startBtn').innerText = "重新渲染";
                isRecording = false;
            };

            source.start(0); recorder.start();
            document.getElementById('recStatus').classList.remove('hidden');
            document.getElementById('startBtn').disabled = true;
            isRecording = true;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function loop() {
                if (!isRecording) return;
                analyser.getByteFrequencyData(dataArray);
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(mainImg,0,0,canvas.width,canvas.height);

                // --- 学术修正：分频特征提取与大幅视觉增益 ---
                const bass = dataArray[2] || 0;     // 20-100Hz 响应左手扫弦
                const mid = dataArray[15] || 0;     // 500-1kHz 响应右手节奏
                const treble = dataArray[25] || 0;  // 1k-2kHz 响应唇语高频

                // 1. 动态双轴对口型 (增益系数 1.25)
                const mx = canvas.width * (controls.mX.value/100);
                const my = canvas.height * (controls.mY.value/100);
                const trebleGap = (treble / 255) * 60; // 大幅撬开静态嘴巴
                ctx.fillStyle = "rgba(10,10,10,0.95)";
                ctx.beginPath();
                ctx.ellipse(mx, my, 28, 8 + trebleGap, 0, 0, Math.PI*2);
                ctx.fill();

                // 2. 动态左手 (按弦手：响应低频，大幅水平 X轴跳动 + 纵向 Y轴震动)
                const lx = canvas.width * (controls.lX.value/100) + (bass/6);
                const ly = canvas.height * (controls.lY.value/100) + Math.sin(Date.now()*0.02)*12;
                ctx.fillStyle = "#10b981"; ctx.shadowBlur = 20; ctx.shadowColor = "#10b981";
                for(let i=0; i<4; i++) {
                    const posX = (lx - 60) + (i * 40);
                    const posY = ly + (bass/15);
                    ctx.beginPath(); ctx.arc(posX, posY, 14, 0, Math.PI*2); ctx.fill();
                }

                // 3. 动态右手 (拨弦手：响应中频节奏产生显著纵向跳动)
                const rx = canvas.width * (controls.rX.value/100);
                const ry = canvas.height * (controls.rY.value/100) + (mid/3);
                ctx.fillStyle = "#a855f7"; ctx.shadowBlur = 20; ctx.shadowColor = "#a855f7";
                ctx.beginPath(); ctx.arc(rx, ry, 20, 0, Math.PI*2); ctx.fill();
                
                ctx.shadowBlur = 0;
                requestAnimationFrame(loop);
            }
            loop();
            source.onended = () => { recorder.stop(); audioCtx.close(); document.getElementById('recStatus').classList.add('hidden'); document.getElementById('startBtn').disabled = false; };
        }

        document.getElementById('startBtn').onclick = () => {
            if (!mainImg.src || !document.getElementById('audIn').files[0]) { alert("请确保图片和 MP3 已载入。"); return; }
            startEngine().catch(e => alert("渲染失败，请检查文件格式: " + e));
        };
    </script>
</body>
</html>
